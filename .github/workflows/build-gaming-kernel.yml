name: Build Kernel (BORE)

on:
  workflow_dispatch:
    inputs:
      processor_opt:
        description: 'CPU optimization (native, zen4, generic)'
        required: true
        default: 'generic'
        type: choice
        options:
          - native
          - zen4
          - generic
      llvm_lto:
        description: 'LLVM LTO mode (none, thin, full)'
        required: true
        default: 'none'
        type: choice
        options:
          - none
          - thin
          - full
      build_zfs:
        description: 'Build ZFS module'
        required: false
        default: 'no'
        type: boolean
      build_nvidia_open:
        description: 'Build NVIDIA Open module (Turing+ GPU)'
        required: false
        default: 'no'
        type: boolean
      build_r8125:
        description: 'Build r8125 module'
        required: false
        default: 'no'
        type: boolean

env:
  CCACHE_DIR: /home/builder/.ccache

jobs:
  build:
    name: linux-cachyos-bore
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup build environment
      run: |
        # Use CachyOS repository
        cat << 'EOF' >> /etc/pacman.conf
        [cachyos]
        Server = https://mirror.cachyos.org/repo/x86_64/cachyos
        EOF

        pacman-key --init
        pacman-key --recv-keys F3B607488DB35A47 --keyserver keyserver.ubuntu.com
        pacman-key --lsign-key F3B607488DB35A47
        pacman -Syu --noconfirm --needed git ccache base-devel llvm clang lld compiler-rt

        # Setup builder user
        useradd builder -m
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chmod -R a+rw .

        # Use all threads for building
        sed -i 's/#MAKEFLAGS="-j2"/MAKEFLAGS="-j$(nproc) -l$(nproc)"/g' /etc/makepkg.conf

        # Setup a packager name to indicate that kernel has built with CI
        sed -i 's/#PACKAGER=".*"/PACKAGER="CachyOS Kernel Builder <builder@localhost>"/g' /etc/makepkg.conf

        # Setup ccache
        sed -i 's|!ccache|ccache|' /etc/makepkg.conf
        sudo -u builder mkdir -p ${{ env.CCACHE_DIR }}

        # Set Clang as default compiler
        echo "CC=clang" >> /etc/makepkg.conf
        echo "CXX=clang++" >> /etc/makepkg.conf
        echo "LD=ld.lld" >> /etc/makepkg.conf

    - name: Setup ccache
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-bore-${{ github.run_id }}
        restore-keys: |
          ccache-bore

    - name: Configure PKGBUILD
      run: |
        cd "linux-cachyos-bore"
        
        # Set CPU optimization
        sed -i "s/: \"\${_processor_opt:=}\"/: \"\${_processor_opt:=${{ inputs.processor_opt }}}\"/" PKGBUILD
        
        # Set LLVM LTO mode
        sed -i "s/: \"\${_use_llvm_lto:=none}\"/: \"\${_use_llvm_lto:=${{ inputs.llvm_lto }}}\"/" PKGBUILD
        
        # Enable ZFS if requested
        if [ "${{ inputs.build_zfs }}" = "true" ]; then
          sed -i "s/: \"\${_build_zfs:=no}\"/: \"\${_build_zfs:=yes}\"/" PKGBUILD
        fi
        
        # Enable NVIDIA Open if requested
        if [ "${{ inputs.build_nvidia_open }}" = "true" ]; then
          sed -i "s/: \"\${_build_nvidia_open:=no}\"/: \"\${_build_nvidia_open:=yes}\"/" PKGBUILD
        fi
        
        # Enable r8125 if requested
        if [ "${{ inputs.build_r8125 }}" = "true" ]; then
          sed -i "s/: \"\${_build_r8125:=no}\"/: \"\${_build_r8125:=yes}\"/" PKGBUILD
        fi

    - name: Build kernel package
      id: makepkg
      run: |
        cd "linux-cachyos-bore"
        sudo -H -E -u builder makepkg --skipchecksums --syncdeps --noconfirm

    - name: Upload kernel package
      id: upload
      uses: actions/upload-artifact@v4
      with:
        name: linux-cachyos-bore
        path: linux-cachyos-bore/*.pkg.tar.zst*
        retention-days: 14
